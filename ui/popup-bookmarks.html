<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
<style>
  .bm-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
  }
  .bm-item:hover { background: var(--bg2); }
  .bm-item:hover .bm-del { opacity: 1; }
  .bm-text { flex: 1; min-width: 0; }
  .bm-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: var(--fg); }
  .bm-url { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 10px; color: var(--dim); margin-top: 2px; }
  .bm-del {
    border: none; background: none; color: var(--dim);
    cursor: pointer; font-family: inherit; font-size: 14px;
    padding: 0; opacity: 0; flex: none;
    transition: opacity 0.1s;
  }
  .bm-del:hover { color: #fb7185; }
  .empty { color: var(--dim); font-size: 12px; padding: 24px 16px; text-align: center; }
</style>
</head>
<body>
  <header>bookmarks<small>Ctrl+D to save · Ctrl+B to open</small></header>
  <main id="list"></main>
  <footer>click a bookmark to navigate · × to remove</footer>
<script>
  (async () => {
    const bms = await window.noctra.getBookmarks();
    const list = document.getElementById('list');
    if (!bms.length) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.textContent = 'no bookmarks yet — press Ctrl+D on any page';
      list.appendChild(e);
      return;
    }
    for (const b of bms) {
      const row = document.createElement('div');
      row.className = 'bm-item';

      const text = document.createElement('div');
      text.className = 'bm-text';

      const title = document.createElement('div');
      title.className = 'bm-title';
      title.textContent = b.title || b.url;

      const url = document.createElement('div');
      url.className = 'bm-url';
      url.textContent = b.url;

      text.append(title, url);

      const del = document.createElement('button');
      del.className = 'bm-del';
      del.textContent = '×';
      del.title = 'remove';
      del.onclick = (e) => {
        e.stopPropagation();
        window.noctra.removeBookmark(b.url);
        row.remove();
        if (!list.children.length) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'no bookmarks yet — press Ctrl+D on any page';
          list.appendChild(empty);
        }
      };

      row.append(text, del);
      row.onclick = () => window.noctra.navigateBookmark(b.url);
      list.appendChild(row);
    }
  })();
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.noctra.closePopup(); });
</script>
</body>
</html>
